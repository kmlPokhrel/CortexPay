<!DOCTYPE html>
<html>
<head>
    <title>Join | Neural Vision</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container" style="max-width: 450px;">
        <div class="glass-card text-center">
            <h2 class="mb-4">Create Account</h2>
            <form action="/register" method="POST">
                <div class="mb-3 text-start">
                    <label class="small text-secondary">Full Name</label>
                    <input type="text" class="form-control" required>
                </div>
                <div class="mb-3 text-start">
                    <label class="small text-secondary">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4 text-start">
                    <label class="small text-secondary">Password</label>
                    <input type="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-premium w-100 py-2 mb-3">Register</button>
                <a href="/login" class="small text-secondary text-decoration-none">Already have an account? Login</a>
            </form>
        </div>
    </div>
</body>
</html>
