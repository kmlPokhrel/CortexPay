<!DOCTYPE html>
<html>
<head>
    <title>Login | Neural Vision</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex align-items-center vh-100">
    <div class="container" style="max-width: 450px;">
        <div class="glass-card text-center p-4 shadow-lg">
            <h2 class="mb-4 fw-bold">Neural <span class="text-info">Vision</span></h2>
            <p class="text-secondary small mb-4">Access the world's most accurate digit AI.</p>
            
            <button id="google-login" class="btn btn-light w-100 py-2 mb-3 d-flex align-items-center justify-content-center shadow-sm border">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" class="me-2">
                Continue with Google
            </button>

            <div class="d-flex align-items-center my-3">
                <hr class="flex-grow-1">
                <span class="mx-2 text-muted small">OR MANUAL LOGIN</span>
                <hr class="flex-grow-1">
            </div>

            <form action="/manual-login" method="POST">
                <div class="mb-3 text-start">
                    <input type="email" name="email" class="form-control py-2" placeholder="Email Address" required>
                </div>
                <div class="mb-4 text-start">
                    <input type="password" name="password" class="form-control py-2" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2 shadow-sm">Login to Dashboard</button>
            </form>

            <div class="mt-4">
                <a href="/" class="small text-secondary text-decoration-none">← Back to Home</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "{{ firebase_api_key }}",
            authDomain: "ai-stripe-44320.firebaseapp.com",
            projectId: "ai-stripe-44320",
            storageBucket: "ai-stripe-44320.firebasestorage.app",
            messagingSenderId: "90613111569",
            appId: "1:90613111569:web:3a13a2386888e407a30ab0"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        document.getElementById('google-login').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                const response = await fetch('/firebase-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: user.displayName, email: user.email })
                });

                if (response.ok) { window.location.href = "/check-access"; }
            } catch (error) {
                console.error("Login failed:", error);
                alert("Please use http://localhost:5000 for Google Sign-In.");
            }
        };
    </script>
</body>
</html>
