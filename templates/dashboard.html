<!DOCTYPE html>
<html>
<head>
    <title>AI Dashboard | Neural Vision</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="py-5">
    <nav class="container mb-5">
        <div class="d-flex justify-content-between align-items-center glass-card py-3 px-4">
            <h4 class="mb-0 fw-bold">🧠 NEURAL <span class="text-info">VISION</span></h4>
            <a href="/" class="btn btn-sm btn-outline-secondary">Logout</a>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="glass-card text-center">
                    <h2 class="mb-4">Digit Recognizer</h2>
                    <p class="text-secondary mb-4">Upload a handwritten digit to see the AI in action.</p>
                    
                    <div class="mb-4">
                        <label for="imageInput" class="btn btn-outline-info w-100 py-3 mb-3" style="border-style: dashed;">
                            Click to Upload Image
                        </label>
                        <input type="file" id="imageInput" class="d-none" accept="image/*" onchange="previewImage(event)">
                        
                        <div id="previewContainer" class="d-none mb-3">
                            <img id="imagePreview" src="#" alt="Preview" class="img-fluid rounded border border-secondary" style="max-height: 200px;">
                        </div>
                    </div>

                    <button onclick="predict()" id="analyzeBtn" class="btn btn-premium btn-lg w-100 py-3 shadow">
                        Run AI Analysis
                    </button>

                    <div id="resultArea" class="mt-5 d-none animate-flicker">
                        <p class="text-uppercase small tracking-widest text-secondary mb-0">AI Prediction</p>
                        <h1 class="display-1 fw-bold text-info" id="predictionText">?</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function previewImage(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const output = document.getElementById('imagePreview');
                output.src = reader.result;
                document.getElementById('previewContainer').classList.remove('d-none');
            };
            reader.readAsDataURL(event.target.files[0]);
        }

        async function predict() {
            const btn = document.getElementById('analyzeBtn');
            const fileInput = document.getElementById('imageInput');
            if (fileInput.files.length === 0) return alert("Please upload an image first!");

            btn.innerText = "Analyzing Brain Waves...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            const response = await fetch('/predict', { method: 'POST', body: formData });
            const data = await response.json();
            
            document.getElementById('resultArea').classList.remove('d-none');
            document.getElementById('predictionText').innerText = data.prediction;
            
            btn.innerText = "Run AI Analysis";
            btn.disabled = false;
        }
    </script>
</body>
</html>
